<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SiddhiExports — International Parcel Services">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B3C5D"/>
      <stop offset="1" stop-color="#072639"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="260" fill="#F4A300" opacity="0.12"/>
  <circle cx="120" cy="560" r="200" fill="#F4A300" opacity="0.10"/>
  <!-- logo box -->
  <g transform="translate(90,150)">
    <path d="M60 0 120 30v60L60 120 0 90V30z" fill="#F4A300"/>
    <path d="M60 0 120 30 60 60 0 30z" fill="#ffb733"/>
    <path d="M60 60v60L0 90V30z" fill="#d98e00"/>
  </g>
  <text x="250" y="220" font-family="Poppins, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff">SiddhiExports</text>
  <text x="250" y="300" font-family="Poppins, Arial, sans-serif" font-size="40" font-weight="600" fill="#F4A300">International Parcel Services from India</text>
  <text x="90" y="430" font-family="Inter, Arial, sans-serif" font-size="34" fill="#dbe7f0">Send parcels safely to the UK, Canada, USA,</text>
  <text x="90" y="480" font-family="Inter, Arial, sans-serif" font-size="34" fill="#dbe7f0">Australia &amp; Europe — doorstep pickup &amp; tracking.</text>
  <text x="90" y="580" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" fill="#F4A300">Get a free shipping quote in under 1 minute</text>
</svg>
